{% extends 'base.html' %}
{% block content %}
<section class="csv-viewer-section" style="padding: 2rem 1rem; max-width: 1200px; margin: 0 auto;">
    <div style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
        <h1 class="page-title" style="margin: 0; font-size: 2rem; color: #ffffff;">{{ title }}</h1>
        
        <div style="display: flex; gap: 1rem;">
            {% if download_key %}
            <a href="/download/live/{{ download_key }}" class="btn primary-btn" style="padding: 0.5rem 1.5rem; border-radius: 20px; font-size: 0.9rem; text-decoration: none; background: #28a745; color: white;">📥 Download CSV</a>
            {% endif %}
            
            <a href="/scraping/static" class="btn primary-btn" style="padding: 0.5rem 1.5rem; border-radius: 20px; font-size: 0.9rem; text-decoration: none;">← Back to Projects</a>
        </div>
    </div>

    <div class="table-responsive-container" style="width: 100%; overflow-x: auto; background: #1a1f2c; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); border: 1px solid #2d3748; padding: 1rem;">
        {{ table_html | safe }}
    </div>
</section>

<style>
    .csv-data-table {
        width: 100%;
        border-collapse: collapse;
        font-family: inherit;
        font-size: 0.9rem;
        text-align: left;
        color: #e2e8f0;
    }
    .csv-data-table th {
        background-color: #38bdf8;
        color: #0f172a;
        padding: 0.75rem 1rem;
        font-weight: 600;
        white-space: nowrap;
    }
    .csv-data-table td {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid #2d3748;
    }
    .csv-data-table tr:hover {
        background-color: rgba(255, 255, 255, 0.05);
    }
</style>
{% endblock %}
