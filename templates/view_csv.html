{% extends 'base.html' %}
{% block content %}
<section class="csv-viewer-section" style="padding: 2rem 1rem; max-width: 1200px; margin: 0 auto;">
    <div style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
        <h1 class="page-title" style="margin: 0; font-size: 2rem; text-align: left;">{{ title }}</h1>
        
        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            {% if download_key %}
            <a href="/download/live/{{ download_key }}" class="btn primary-btn"><i class="fa-solid fa-download"></i> Download CSV</a>
            {% endif %}
            
           <a href="{{ back_url if back_url else '/scraping/static' }}" class="btn secondary-btn"><i class="fa-solid fa-arrow-left"></i> Back to Projects</a>
        </div>
    </div>

    <div class="table-container">
        {{ table_html | safe }}
    </div>
</section>
{% endblock %}
